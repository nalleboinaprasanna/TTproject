version: '3.8'

services:
  backend:
    build:
      context: ./itam-backend
    container_name: itam-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./itam-frontend
    container_name: itam-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
